name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write   # required for publish-unit-test-result-action to create check runs

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: |
          dotnet restore src/Telemetry.Api/Telemetry.Api.csproj
          dotnet restore tests/Telemetry.UnitTests/Telemetry.UnitTests.csproj
          dotnet restore tests/Telemetry.IntegrationTests/Telemetry.IntegrationTests.csproj

      - name: Build
        run: |
          dotnet build src/Telemetry.Api/Telemetry.Api.csproj --no-restore -p:TreatWarningsAsErrors=false
          dotnet build tests/Telemetry.UnitTests/Telemetry.UnitTests.csproj --no-restore -p:TreatWarningsAsErrors=false
          dotnet build tests/Telemetry.IntegrationTests/Telemetry.IntegrationTests.csproj --no-restore -p:TreatWarningsAsErrors=false

      - name: Run unit tests
        run: dotnet test tests/Telemetry.UnitTests/Telemetry.UnitTests.csproj --no-build -v normal --logger "trx;LogFileName=unit-tests.trx" --results-directory ./TestResults

      - name: Run integration tests (Docker)
        run: dotnet test tests/Telemetry.IntegrationTests/Telemetry.IntegrationTests.csproj --no-build -v normal --logger "trx;LogFileName=integration-tests.trx" --results-directory ./TestResults
        env:
          DOCKER_HOST: unix:///var/run/docker.sock

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: "TestResults/**/*.trx"
